services:
  - type: web
    name: 2connectv1-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_NAME
        value: 2connectv1-ai
      - key: APP_VERSION
        value: "1.0.0"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PORT
        value: "8000"
      - key: HOST
        value: "0.0.0.0"
      # CORS
      - key: CORS_ORIGINS
        value: '["https://2connectv1-frontend.vercel.app","https://twoconnectv1-backend.onrender.com","https://2connect-admin-dashboard.vercel.app"]'
      - key: ALLOWED_HOSTS
        value: '["*"]'
      # Redis - Upstash
      - key: REDIS_URL
        sync: false
      # Celery - run tasks synchronously (no worker on free tier)
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "true"
      # DynamoDB - AWS
      - key: DYNAMO_PROFILE_TABLE_NAME
        value: staging-user-profiles
      - key: DYNAMO_MATCHES_TABLE_NAME
        value: staging-user-matches
      - key: DYNAMO_FEEDBACK_TABLE_NAME
        value: staging-user-feedback
      - key: DYNAMO_CHAT_TABLE_NAME
        value: staging-ai-chat-records
      - key: DYNAMO_NOTIFIED_PAIRS_TABLE_NAME
        value: staging-notified-match-pairs
      # AWS
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: eu-west-2
      # Anthropic Claude (main LLM service for persona generation, match explanations, ice breakers)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-3-haiku-20240307
      - key: LLM_TEMPERATURE
        value: "0.7"
      # OpenAI (embeddings ONLY - not used for LLM)
      - key: OPENAI_API_KEY
        sync: false
      # Embeddings - Using OpenAI API (not local SentenceTransformers)
      - key: USE_OPENAI_EMBEDDINGS
        value: "true"
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: EMBEDDING_DIMENSION
        value: "1536"
      - key: SIMILARITY_THRESHOLD
        value: "0.7"
      # Matching
      - key: MAX_MATCHES_PER_CYCLE
        value: "10"
      - key: SCHEDULED_RECALCULATE_MATCHES
        value: "true"
      - key: SIMILARITY_UPPER_THRESHOLD
        value: "0.95"
      - key: MAX_INLINE_MATCHES
        value: "50"
      # Advanced Matching Algorithms (priority: HYBRID > ENHANCED > MULTI_VECTOR > BASIC)
      - key: USE_HYBRID_MATCHING
        value: "true"
      - key: USE_ENHANCED_MATCHING
        value: "true"
      - key: USE_MULTI_VECTOR_MATCHING
        value: "true"
      # Enhanced Matching Features
      - key: ENFORCE_HARD_DEALBREAKERS
        value: "true"
      - key: BLOCK_SAME_OBJECTIVE
        value: "true"
      # Multi-Vector Dimension Weights (must sum to 1.0)
      - key: MATCH_WEIGHT_PRIMARY_GOAL
        value: "0.20"
      - key: MATCH_WEIGHT_INDUSTRY
        value: "0.25"
      - key: MATCH_WEIGHT_STAGE
        value: "0.20"
      - key: MATCH_WEIGHT_GEOGRAPHY
        value: "0.15"
      - key: MATCH_WEIGHT_ENGAGEMENT
        value: "0.10"
      - key: MATCH_WEIGHT_DEALBREAKERS
        value: "0.10"
      # Feedback Learning
      - key: FEEDBACK_LEARNING_RATE
        value: "0.02"
      - key: FEEDBACK_MAX_LEARNING_RATE
        value: "0.10"
      - key: FEEDBACK_NORMALIZE_VECTORS
        value: "true"
      - key: FEEDBACK_CONFIDENCE_SCALING
        value: "true"
      - key: FEEDBACK_TARGET_PORTION
        value: requirements
      # PostgreSQL - Supabase (AI DB with pgvector)
      - key: DATABASE_URL
        sync: false
      # Backend PostgreSQL DB (for user_summaries, onboarding_status updates)
      - key: RECIPROCITY_BACKEND_DB_URL
        sync: false
      # Backend Integration
      - key: RECIPROCITY_BACKEND_URL
        value: https://twoconnectv1-backend.onrender.com/api/v1
      # API Security
      - key: API_KEY
        generateValue: true
      - key: WEBHOOK_API_KEY
        sync: false
